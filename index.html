<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ST Thomas School Kharagpur</title>

    <style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;
}

header {
    background-color: #004080;
    color: white;
    padding: 20px 60px;

    display: flex;
    justify-content: space-between;
    align-items: center;

    box-shadow: 0px 3px 10px gray;
}
nav {
    display: flex;
    gap: 25px;
}

nav a {
    color: white;
    text-decoration: none;
    font-size: 22px;
    font-weight: bold;
    transition: 0.3s;
}

nav a:hover {
    color: yellow;
    transform: scale(1.1);
}

.hero {
    text-align: center;
    padding: 100px 20px;
    background: #e8f1ff;
}

.hero h2 {
    font-size: 48px;
    color: #004080;
    margin-bottom: 20px;
}

.hero p {
    font-size: 20px;
    color: #555;
    margin-bottom: 30px;
}

.hero a {
    display: inline-block;
    background: #004080;
    color: white;
    text-decoration: none;
    padding: 15px 30px;
    border-radius: 8px;
    font-size: 18px;
    transition: 0.3s;
}

.hero a:hover {
    background: #0066cc;
}

/* ===========================
   Mobile Responsive Design
=========================== */

@media (max-width: 768px) {

    header {
        flex-direction: column;
        text-align: center;
        padding: 20px;
    }

    .navbar {
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    nav {
        display: flex;
        flex-direction: column;
        gap: 15px;
        margin-top: 20px;
    }

    nav a {
        font-size: 20px;
    }

    .hero {
        padding: 60px 20px;
    }

    .hero h2 {
        font-size: 34px;
    }

    .hero p {
        font-size: 18px;
    }

    .hero a {
        padding: 12px 25px;
    }

}
.menu-btn{
    display:none;
    background:none;
    border:none;
    color:white;
    font-size:35px;
    cursor:pointer;
}

@media(max-width:768px){

    .menu-btn{
        display:block;
    }

    .nav-links{
        display:none;
        flex-direction:column;
        width:100%;
        text-align:center;
        margin-top:20px;
    }

    .nav-links.active{
        display:flex;
    }

    header{
        padding:20px;
    }

    .navbar{
        display:flex;
        justify-content:space-between;
        align-items:center;
        flex-wrap:wrap;
    }

    .hero h2{
        font-size:32px;
    }

}
</style>
</head>
<body>

<header>

    <div class="navbar">

        <h1> Kharagpur Sukantapally ST Thomas School</h1>

        <nav>
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Admissions</a>
            <a href="#">Gallery</a>
            <a href="#">Contact</a>
            <a href="#">Login</a>
        </nav>

    </div>

</header>

<section class="hero">

    <h2>Welcome to Kharagpur Sukantapally ST Thomas School</h2>

    <p>
        We provide quality education, discipline, and excellence to help every student achieve their dreams.
    </p>

    <a href="#">Explore More</a>

</section>

</body>
</html>
